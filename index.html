<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relógio</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    .clock {
      width: 240px;
      height: 240px;
      border: 6px solid #fff;
      border-radius: 50%;
      position: relative;
    }

    .number {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 14px;
    }

    .center-dot {
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    .hand {
      position: absolute;
      width: 50%;
      height: 2px;
      background: #fff;
      top: 50%;
      left: 50%;
      transform-origin: 0% 50%;
      transform: rotate(-90deg);
      z-index: 2;
      transition: transform 0.8s linear;
    }

    .text {
      margin-top: 20px;
      font-size: 24px;
      text-align: center;
    }
  </style>
</head>
<body>

<audio id="bgm" loop preload="auto" autoplay muted>
  <source src="An RNG Site OST - Procrastination.mp3" type="audio/mpeg">
</audio>

<div class="clock" id="clock">
  <div class="hand" id="hand"></div>
  <div class="center-dot"></div>
</div>

<div class="text" id="message">Vocês testaram minha paciência</div>


<script>
  const clock = document.getElementById('clock');
  const hand = document.getElementById('hand');
  const bgm = document.getElementById('bgm');
  

  bgm.volume = 0.15;

  // tentar iniciar automaticamente (muted permitido)
  bgm.play().catch(()=>{});

  // remover mute assim que houver qualquer interação
  function unlockAudio(){
    bgm.muted = false;
    bgm.play();
    document.removeEventListener('click', unlockAudio);
    document.removeEventListener('mousemove', unlockAudio);
  }

  document.addEventListener('click', unlockAudio);
  document.addEventListener('mousemove', unlockAudio);

  
  document.addEventListener('click', () => {
    if (bgm.paused) startMusic();
  }, { once: true });

  for (let i = 1; i <= 12; i++) {
    const num = document.createElement('div');
    num.className = 'number';
    num.innerText = i;

    const angle = (i * 30) * Math.PI / 180;
    const radius = 100;

    const x = 120 + radius * Math.sin(angle);
    const y = 120 - radius * Math.cos(angle);

    num.style.left = x + 'px';
    num.style.top = y + 'px';

    clock.appendChild(num);
  }

  function getNextTarget() {
    const now = new Date();
    let target = new Date(now.getFullYear(), 4, 25, 0, 0, 0);
    if (now > target) {
      target = new Date(now.getFullYear() + 1, 4, 25, 0, 0, 0);
    }
    return target;
  }

  function updateClock() {
    const now = new Date();
    const target = getNextTarget();
    const start = new Date(target.getFullYear() - 1, 4, 25, 0, 0, 0);

    const total = target - start;
    const elapsed = now - start;
    const progress = Math.max(0, Math.min(1, elapsed / total));

    const degrees = -90 + progress * 360;
    hand.style.transform = `rotate(${degrees}deg)`;
  }

  setInterval(updateClock, 1000);
  updateClock();

  // mensagens aleatórias
  const messages = [
    "Vocês testaram minha paciência",
    "E-Eu.. Tentei ajudar",
    "Eu poderia repetir isso várias vezes",
    "Não, os deixe-os",
    ". ..- / ... . -- .--. .-. . / - . -. - .- .-. . .. / .- .--- ..- -.. .- .-. / ...- --- -.-. ... --..-- / -. --- / .. -- .--. --- .-. - .- / .- / --- -.-. .- ... .. --- .-.-.-",
    "..--- ..... / -.. . / -- .- .. --- / . ... - / .--. .-. --- -..- .. -- --- --..-- / ...- --- -.-. / . ... - / .--. .-. . .--. .- .-. .- -.. --- / .--. .- .-. .- / .--. .-. --- ...- .- .-. / -.. .- / ... ..- .- / .--. .-. .--. .. .- / -- . -. - .. .-. .- ..--..",
    "Eu queria",
    "Pelo menos, eu queria que vocês se divertissem um pouco",
    "Mas... Vocês não parecem estar se divertindo",
    "Eu... Eu não sei o que fazer",
    "Eu... Eu só queria ajudar",
    "Por que vocês não estão se divertindo?",
    "Eu... Eu não sei o que fazer",
  ];

  const messageEl = document.getElementById('message');

  function changeMessage() {
    const random = Math.floor(Math.random() * messages.length);
    messageEl.textContent = messages[random];

    const nextTime = Math.random() * 4000 + 2000; // entre 2s e 6s
    setTimeout(changeMessage, nextTime);
  }

  changeMessage();
</script>

</body>
</html>
